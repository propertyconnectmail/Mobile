<ion-content [fullscreen]="true" class="browse-consultants">
  <!-- Sticky Top Section -->
  <div class="top-section">
    <!-- Header -->
    <div class="header">
      <div class="left-section">
        <!-- <img src="assets/logo.svg" alt="Logo" class="logo" /> -->
        <h1>All Consultants</h1>
      </div>
    </div>

    <!-- Search Bar -->
    <div class="search-bar">
      <img src="assets/search.svg" alt="Search" class="search-icon" />
      <input
        type="text"
        placeholder="Search for professionals"
        [(ngModel)]="searchTerm"
        (ngModelChange)="onSearchChange()"
      />
    </div>

    <!-- Category Scroll -->
    <div class="category-scroll">
      <button
        *ngFor="let category of categories"
        class="category-button"
        [class.active]="selectedCategory === category.value"
        (click)="selectCategory(category.value)"
      >
        {{ category.label }}
      </button>
    </div>

    <!-- ============ ADDED FOR LOCATION FILTER ============ -->
    <!-- Filter Toggle Button -->
    <div class="filter-toggle">
      <button class="filter-toggle-btn" (click)="toggleLocationFilter()" [class.active]="showLocationFilter || selectedProvince !== 'all'">
        <svg class="filter-btn-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon>
        </svg>
        <span>Filter by Location</span>
        <svg 
          class="chevron-icon"
          [class.rotated]="showLocationFilter"
          xmlns="http://www.w3.org/2000/svg" 
          viewBox="0 0 24 24" 
          fill="none" 
          stroke="currentColor" 
          stroke-width="2" 
          stroke-linecap="round" 
          stroke-linejoin="round"
        >
          <polyline points="6 9 12 15 18 9"></polyline>
        </svg>
      </button>
      <button 
        class="clear-filter-btn" 
        *ngIf="selectedProvince !== 'all'" 
        (click)="clearLocationFilters()"
      >
        Clear
      </button>
    </div>

    <!-- Location Filter Dropdowns -->
    <div class="location-filter" *ngIf="showLocationFilter">
      <div class="filter-row">
        <div class="filter-group">
          <label>Province</label>
          <select [(ngModel)]="selectedProvince" (ngModelChange)="onProvinceChange()">
            <option value="all">All Provinces</option>
            <option *ngFor="let province of provinces" [value]="province">{{ province }}</option>
          </select>
        </div>
        <div class="filter-group">
          <label>District</label>
          <select [(ngModel)]="selectedDistrict" (ngModelChange)="onDistrictChange()" [disabled]="selectedProvince === 'all'">
            <option value="all">All Districts</option>
            <option *ngFor="let district of districts" [value]="district">{{ district }}</option>
          </select>
        </div>
      </div>
    </div>
    <!-- ============ END ============ -->
  </div>

  <!-- Scrollable Cards Section -->
  <div class="cards-container">
    <div class="cards-grid" >
      <div class="consultant-card" *ngFor="let consultant of filteredConsultants" (click)="professionalPage(consultant.email)">
        <div class="image-wrapper">
          <img [src]="consultant.url" alt="Consultant Photo" />
        </div>
        <h3>{{ consultant.firstName }} {{ consultant.lastName }}</h3>
        <div class="role">{{ consultant.type | titlecase }}</div>
        <div class="rating">
          <img src="assets/star-filled.svg" alt="Star" />
          {{ consultant.averageRating}} <span class="fee" style="margin: 0; padding: 0;">&nbsp; &nbsp;{{ '(LKR ' +consultant.consultationFee+')' }}</span>
        </div>
      </div>
    </div>
    <div class="shimmer-grid" *ngIf="isLoading">
      <div class="shimmer-card" *ngFor="let skeleton of [1,2,3,4,5,6]">
        <div class="shimmer-image shimmer"></div>
        <div class="shimmer-line shimmer short"></div>
        <div class="shimmer-line shimmer"></div>
        <div class="shimmer-line shimmer short"></div>
      </div>
    </div>
  </div>

  <app-bottom-tab></app-bottom-tab>
</ion-content>
